# Frontend CI Pipeline
# Builds the Blazor WebAssembly app on every push/PR to main
#
# Triggers:
#   - Push to main branch (if frontend files changed)
#   - Pull requests targeting main (if frontend files changed)
#
# Cost: Free for public repositories (unlimited minutes)

name: Frontend CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - "src/shared/**"
      - "tests/MTGCollectionTracker.Client.Tests/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/frontend/**"
      - "src/shared/**"
      - "tests/MTGCollectionTracker.Client.Tests/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Install .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Step 3: Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore MTGCollectionTracker.Frontend.slnx

      # Step 4: Check for known vulnerable packages (fails build if any found)
      - name: Audit for vulnerabilities
        run: dotnet list MTGCollectionTracker.Frontend.slnx package --vulnerable --include-transitive

      # Step 5: Build in Release mode
      - name: Build
        run: dotnet build MTGCollectionTracker.Frontend.slnx --configuration Release --no-restore

      # Step 6: Run tests
      - name: Test
        run: dotnet test MTGCollectionTracker.Frontend.slnx --configuration Release --no-build --verbosity normal
