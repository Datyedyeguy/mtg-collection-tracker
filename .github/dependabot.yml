version: 2
updates:
  # Keep GitHub Actions pinned to latest versions/SHAs
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"

  # Keep NuGet packages up to date
  - package-ecosystem: "nuget"
    directory: "/src/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "nuget"
    directory: "/src/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "nuget"
    directory: "/src/shared"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "nuget"
    directory: "/src/utilities"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
